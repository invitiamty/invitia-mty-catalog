    <title id="pageTitle"></title>

    <!-- Tipografia -->

  <body>
    <!-- HERO -->
    <section class="hero">
      <div class="overlay"></div>

      <div
  class="hero-content"
  data-aos="fade-up"
>
        <p class="save-the-date">SAVE THE DATE</p>

        <h1 id="coupleNames"></h1>

        <p class="date" id="dateText"></p>

        <button id="musicButton">🎵 Música</button>
      </div>
    </section>

    <!-- CUENTA REGRESIVA -->
    <section
  class="countdown-section"
  data-aos="fade-up"
>
      <h2>Faltan</h2>

      <div class="countdown">
        <div>
          <span id="days">0</span>
          <p>Días</p>
        </div>

        <div>
          <span id="hours">0</span>
          <p>Horas</p>
        </div>

        <div>
          <span id="minutes">0</span>
          <p>Min</p>
        </div>

        <div>
          <span id="seconds">0</span>
          <p>Seg</p>
        </div>
      </div>
    </section>

    <!-- UBICACION -->
    <section
  class="location"
  data-aos="fade-right"
>
      <h2>Ubicación</h2>

      <p id="locationName"></p>

      <a
        id="mapsLink"
        target="_blank"
        class="map-button"
      >
        Ver ubicación
    </a>
    </section>

    <!-- RSVP -->
    <section
  class="rsvp"
  data-aos="zoom-in"
>
      <h2>Confirmar asistencia</h2>

      <a
        id="whatsappLink"
        target="_blank"
        class="rsvp-button"
      >
        Confirmar por WhatsApp
      </a>
    </section>
