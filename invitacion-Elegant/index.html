<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title></title>

  <!-- GOOGLE FONTS -->

  <link
href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&family=DM+Serif+Display&family=Great+Vibes&family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700&family=Raleway:wght@300;400;500;600&display=swap"
rel="stylesheet"
/>

  <!-- CSS -->

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- AMBIENT LIGHTS -->

<div class="ambient ambient-1"></div>
<div class="ambient ambient-2"></div>
<div class="ambient ambient-3"></div>

<!-- LOADER -->

<div class="loader" id="loader">

  <div class="loader-content">

    <h1>
      INVITIA MTY
    </h1>

    <p id="loaderText"></p>

  </div>

</div>

  <!-- HERO -->

  <section
  class="hero"
  data-parallax
>
    <div class="overlay"></div>

    <!-- MUSIC BUTTON -->

    <button id="musicButton">
      🎵
    </button>

    <!-- HERO CONTENT -->

    <div class="hero-content">

      <p
  class="save-the-date"
  id="saveTheDate"
></p>

      <h1 id="coupleNames"></h1>

      <p
        class="hero-date"
        id="dateText"
      ></p>

      <p class="hero-message">
        Nos encantaría compartir
        este momento contigo
      </p>

    </div>

    <!-- SCROLL INDICATOR -->

    <div class="scroll-indicator">
      ↓
    </div>

  </section>

  <!-- STORY SECTION -->

  <section
  class="story-section"
  data-reveal
>

    <div class="story-content">

     <p
  class="story-small"
  id="storySmall"
></p>

      <h2 id="storyTitle"></h2>

      <p
        class="story-text"
        id="storyText"
      ></p>

    </div>

  </section>

  <!-- COUNTDOWN -->
<section
  class="countdown-section"
  data-reveal
>
    <div class="countdown-content">

      <p
  class="countdown-small"
  id="countdownSmall"
></p>

      <h2
  class="countdown-title"
  id="countdownTitle"
></h2>

      <div class="countdown-grid">

        <div class="countdown-item">
          <span id="days">0</span>
          <p id="daysLabel"></p>
        </div>

        <div class="countdown-item">
          <span id="hours">0</span>
          <p id="hoursLabel"></p>
        </div>

        <div class="countdown-item">
          <span id="minutes">0</span>
          <p id="minutesLabel"></p>
        </div>

        <div class="countdown-item">
          <span id="seconds">0</span>
          <p id="secondsLabel"></p>
        </div>

      </div>

    </div>

  </section>

<!-- CALENDAR -->

<section class="calendar-section">

  <a
    id="calendarButton"
    target="_blank"
    class="calendar-button"
  >
    Agregar al calendario
  </a>

</section>

  <!-- GALLERY -->
<section
  class="gallery-section"
  data-reveal
>
    <div class="gallery-header">

      <p
  class="gallery-small"
  id="gallerySmall"
></p>

      <h2
  class="gallery-title"
  id="galleryTitle"
></h2>

    </div>

    <div
      class="gallery-grid"
      id="galleryGrid"
    ></div>

  </section>

<!-- TIMELINE -->

<section
  class="timeline-section"
  data-reveal
>

  <div class="timeline-header">

    <p
  class="timeline-small"
  id="timelineSmall"
></p>

    <h2
  class="timeline-title"
  id="timelineTitle"
></h2>

  </div>

  <div
    class="timeline"
    id="timeline"
  ></div>

</section>

<!-- DETAILS -->

<section
  class="details-section"
  data-reveal
>

  <div class="details-header">

    <p
  class="details-small"
  id="detailsSmall"
></p>

    <h2
  class="details-title"
  id="detailsTitle"
></h2>

  </div>

  <div
    class="details-grid"
    id="detailsGrid"
  ></div>

</section>

<!-- GIFTS -->

<section
  class="gifts-section"
  data-reveal
>

  <div class="gifts-header">

    <p
  class="gifts-small"
  id="giftsSmall"
></p>

    <h2
  class="gifts-title"
  id="giftsTitle"
></h2>

  </div>

  <div
    class="gifts-grid"
    id="giftsGrid"
  ></div>

</section>

<!-- RSVP -->

<section
  class="rsvp-section"
  data-reveal
>

  <div class="rsvp-header">

 <p
  class="rsvp-small"
  id="rsvpSmall"
></p>

    <h2
      class="rsvp-title"
      id="rsvpTitle"
    ></h2>

    <p
      class="rsvp-subtitle"
      id="rsvpSubtitle"
    ></p>

  </div>

  <form
    class="rsvp-form"
    id="rsvpForm"
  >

    <input
      type="text"
      id="guestName"
      placeholder="Tu nombre"
      required
    />

    <input
      type="number"
      id="guestCount"
      placeholder="Número de invitados"
      required
    />

    <textarea
      id="guestMessage"
      placeholder="Mensaje para los novios"
    ></textarea>

    <button type="submit">
      Confirmar asistencia
    </button>

  </form>

</section>

<!-- LIGHTBOX -->

<div
  class="lightbox"
  id="lightbox"
>

  <span
    class="lightbox-close"
    id="lightboxClose"
  >
    ✕
  </span>

  <img
    id="lightboxImage"
    src=""
    alt=""
  />

</div>

    </svg>

    <span id="instagramText"></span>

  </a>

</footer>

  <!-- MUSIC -->

  <audio
    id="backgroundMusic"
    loop
  >
    <source
      src="assets/music/song.mp3"
      type="audio/mpeg"
    />
  </audio>

  <!-- JS -->

  <script src="data.js"></script>

  <script src="script.js"></script>

</body>
</html>
